
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slider-image {
            min-width: 100%;
            object-fit: cover;
        }

        .slider-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .slider-button:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .slider-button.prev {
            left: 16px;
        }

        .slider-button.next {
            right: 16px;
        }

        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'roblox-dark': '#191B1D',
                        'roblox-dark-secondary': '#232527',
                        'roblox-blue': '#00A2FF',
                    }
                }
            }
        }
    </script>
  <meta property="og:image" content="/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/og_default.png">
</head>
<body class="bg-white dark:bg-roblox-dark text-gray-900 dark:text-white transition-colors duration-200">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-gray-100 dark:bg-roblox-dark-secondary shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex justify-between items-center">
                    <h1 id="gameTitle" class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white">
                        Loading...
                    </h1>
                    <div class="flex gap-3">
                        <!-- Language Toggle -->
                        <button id="langToggle" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors font-medium text-sm sm:text-base">
                            RU
                        </button>
                        <!-- Theme Toggle -->
                        <button id="themeToggle" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors font-medium text-sm sm:text-base">
                            🌙
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Left Column: Slider + Description -->
                <div class="space-y-6">
                    <!-- Image Slider -->
                    <div class="slider-container bg-gray-200 dark:bg-roblox-dark-secondary">
                        <div class="slider-wrapper" id="sliderWrapper">
                            <img src="https://tr.rbxcdn.com/180DAY-ac99810b043fcc8b90d47a062764b279/768/432/Image/Webp/noFilter?auto=compress&cs=tinysrgb&w=1200" alt="Game Screenshot 1" class="slider-image h-64 sm:h-80 lg:h-96">
                            <img src="https://tr.rbxcdn.com/180DAY-0319103f58ead123c482d498a9ad2494/768/432/Image/Webp/noFilter?auto=compress&cs=tinysrgb&w=1200" alt="Game Screenshot 2" class="slider-image h-64 sm:h-80 lg:h-96">
                 
                        </div>
                      <button class="slider-button prev" onclick="changeSlide(-1)">‹</button>
                        <button class="slider-button next" onclick="changeSlide(1)">›</button>
                    </div>

                    <!-- Description -->
                    <div class="bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6 shadow-lg">
                        <h2 class="text-xl font-semibold mb-3" data-lang-en="Description" data-lang-ru="Описание">Description</h2>
                        <p id="gameDescription" class="text-gray-700 dark:text-gray-300 leading-relaxed">
                            Loading game description...
                        </p>
                    </div>
                </div>

                <!-- Right Column: Play Button + Stats -->
                <div class="space-y-6">
                    <!-- Play Now Button -->
                    <a id="playLink" href="https://www.roblox.com/games/71240146627158/" target="_blank" class="block">
                        <button class="w-full bg-roblox-blue hover:bg-blue-600 text-white font-bold py-6 px-8 rounded-xl text-2xl shadow-lg transition-all transform hover:scale-105">
                            <span data-lang-en="▶ Play Now" data-lang-ru="▶ Играть сейчас">▶ Play Now</span>
                        </button>
                    </a>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Active Players -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Active" data-lang-ru="Активных">Active</div>
                            <div id="activePlayers" class="text-2xl font-bold text-roblox-blue">-</div>
                        </div>

                        <!-- Favorites -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Favorites" data-lang-ru="Избранное">Favorites</div>
                            <div id="favorites" class="text-2xl font-bold text-yellow-500">-</div>
                        </div>

                        <!-- Visits -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Visits" data-lang-ru="Посещений">Visits</div>
                            <div id="visits" class="text-2xl font-bold text-green-500">-</div>
                        </div>

                        <!-- Server Size -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Server Size" data-lang-ru="Размер сервера">Server Size</div>
                            <div id="serverSize" class="text-2xl font-bold text-purple-500">-</div>
                        </div>

                        <!-- Voice Chat -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Voice Chat" data-lang-ru="Голосовой чат">Voice Chat</div>
                            <div class="text-lg font-semibold text-roblox-blue" data-lang-en="Supported" data-lang-ru="Поддерживается">Supported</div>
                        </div>

                        <!-- Camera -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Camera" data-lang-ru="Камера">Camera</div>
                            <div class="text-lg font-semibold text-roblox-blue" data-lang-en="Supported" data-lang-ru="Поддерживается">Supported</div>
                        </div>

                        <!-- Created -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md col-span-2">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Created" data-lang-ru="Создано">Created</div>
                            <div id="created" class="text-lg font-semibold">-</div>
                        </div>

                        <!-- Updated -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md col-span-2">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Updated" data-lang-ru="Обновлено">Updated</div>
                            <div id="updated" class="text-lg font-semibold">-</div>
                        </div>

                        <!-- Genre -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Genre" data-lang-ru="Жанр">Genre</div>
                            <div id="genre" class="text-lg font-semibold">-</div>
                        </div>

                        <!-- Subgenre -->
                        <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4 shadow-md">
                            <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" data-lang-en="Subgenre" data-lang-ru="Поджанр">Subgenre</div>
                            <div id="subgenre" class="text-lg font-semibold">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configuration
        const UNIVERSE_ID = '9678437015';
        const API_URL = `https://games.roproxy.com/v1/games?universeIds=${UNIVERSE_ID}`;
        const CACHE_KEY = 'roblox_game_data';
        const CACHE_DURATION = 300000; // 5 minutes in milliseconds

        // Language state
        let currentLang = 'en';

        // Slider state
        let currentSlide = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initLanguage();
            fetchGameData();
            setupEventListeners();
        });

        // Theme Toggle
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeButton = document.getElementById('themeToggle');

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeButton.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                themeButton.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Language Toggle
        function initLanguage() {
            const savedLang = localStorage.getItem('language') || 'en';
            currentLang = savedLang;
            updateLanguage();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('language', currentLang);
            updateLanguage();
        }

        function updateLanguage() {
            const langButton = document.getElementById('langToggle');
            langButton.textContent = currentLang === 'en' ? 'RU' : 'EN';

            // Update all elements with language attributes
            document.querySelectorAll('[data-lang-en]').forEach(el => {
                const text = el.getAttribute(`data-lang-${currentLang}`);
                if (text) {
                    el.textContent = text;
                }
            });
        }

        // Image Slider
        function changeSlide(direction) {
            const wrapper = document.getElementById('sliderWrapper');
            const totalSlides = wrapper.children.length;

            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // Auto-slide every 5 seconds
        setInterval(() => {
            changeSlide(1);
        }, 5000);

        // Fetch Game Data
        async function fetchGameData() {
            try {
                // Check cache first
                const cached = getCache();
                if (cached) {
                    updateUI(cached);
                    return;
                }

                // Fetch from API
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch game data');

                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    const gameData = data.data[0];
                    setCache(gameData);
                    updateUI(gameData);
                }
            } catch (error) {
                console.error('Error fetching game data:', error);
                document.getElementById('gameTitle').textContent = 'Error loading game data';
            }
        }

        // Cache Management
        function getCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (!cached) return null;

                const { data, timestamp } = JSON.parse(cached);
                const now = Date.now();

                if (now - timestamp < CACHE_DURATION) {
                    return data;
                }

                localStorage.removeItem(CACHE_KEY);
                return null;
            } catch (error) {
                return null;
            }
        }

        function setCache(data) {
            try {
                const cacheObject = {
                    data: data,
                    timestamp: Date.now()
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheObject));
            } catch (error) {
                console.error('Error setting cache:', error);
            }
        }

        // Update UI with game data
        function updateUI(gameData) {
            // Title
            document.getElementById('gameTitle').textContent = gameData.name || 'Roblox Game';
            document.title = gameData.name || 'Roblox Game';

            // Description
            document.getElementById('gameDescription').textContent = gameData.description || 'No description available.';

            // Stats
            document.getElementById('activePlayers').textContent = formatNumber(gameData.playing || 0);
            document.getElementById('favorites').textContent = formatNumber(gameData.favoritedCount || 0);
            document.getElementById('visits').textContent = formatNumber(gameData.visits || 0);
            document.getElementById('serverSize').textContent = gameData.maxPlayers || '38';

            // Dates
            document.getElementById('created').textContent = formatDate(gameData.created);
            document.getElementById('updated').textContent = formatDate(gameData.updated);

            // Genre
            document.getElementById('genre').textContent = gameData.genre || 'N/A';
            document.getElementById('subgenre').textContent = gameData.genre || 'N/A';

            // Update play link (in case ID mapping differs)
            if (gameData.rootPlaceId) {
                document.getElementById('playLink').href = `https://www.roblox.com/games/${gameData.id}/`;
            }
        }

        // Format numbers (625K+, 1.2M+)
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M+';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(0) + 'K+';
            }
            return num.toString();
        }

        // Format date as MM/DD/YYYY
        function formatDate(dateString) {
            if (!dateString) return 'N/A';

            const date = new Date(dateString);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const year = date.getFullYear();

            return `${month}/${day}/${year}`;
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('langToggle').addEventListener('click', toggleLanguage);
        }
    </script>
</body>
</html>
